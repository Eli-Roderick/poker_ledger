name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Reject retired production APIs
        run: |
          if rg -n --glob '*.dart' \
            'searchLinkedPlayers|addPlayerToSession|updateSessionGroups|listSessionsAsLinkedPlayer|listQuickAddSumsByPlayer|getOrCreateOpenSession|openSessionProvider|playersListProvider|followStatusProvider' \
            lib; then
            echo "A retired roster, sharing, or follow API is reachable."
            exit 1
          fi
          if rg -n -U --glob '*.dart' \
            "\\.from\\('ledger_events'\\)\\s*\\.(insert|update|delete)" \
            lib; then
            echo "Ledger events must be changed only through transactional RPCs."
            exit 1
          fi
      
      - name: Build web
        run: flutter build web --release --base-href "/poker_ledger/"
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  database-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.103.0

      - name: Start local Supabase
        run: supabase start

      - name: Run database and RLS tests
        id: db_tests
        run: |
          set -euo pipefail
          status=0
          : > database-tests.log
          {
            echo '## Database tests'
            echo
          } >> "$GITHUB_STEP_SUMMARY"
          for test_file in supabase/tests/database/*.test.sql; do
            echo "::group::${test_file}"
            tmp_log="$(mktemp)"
            if supabase test db "$test_file" >"$tmp_log" 2>&1; then
              cat "$tmp_log" | tee -a database-tests.log >/dev/null
              echo "- PASS \`${test_file}\`" >> "$GITHUB_STEP_SUMMARY"
            else
              status=1
              cat "$tmp_log" | tee -a database-tests.log >/dev/null
              echo "- FAIL \`${test_file}\`" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::Database test failed: ${test_file}"
              {
                echo
                echo "### Failures in \`${test_file}\`"
                echo
                echo '```'
                # Prefer pgTAP failure details; fall back to the whole file output.
                if grep -E 'not ok|Looks like|ERROR:|FATAL:|permission denied|Failed' "$tmp_log" >/dev/null; then
                  grep -E 'not ok|Looks like|ERROR:|FATAL:|permission denied|Failed|#' "$tmp_log" | tail -n 80
                else
                  tail -n 80 "$tmp_log"
                fi
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              grep -E 'not ok|ERROR:|FATAL:|permission denied' "$tmp_log" | tail -n 20 | while IFS= read -r line; do
                echo "::error file=${test_file}::${line}"
              done
            fi
            rm -f "$tmp_log"
            echo "::endgroup::"
          done
          exit "$status"

      - name: Upload database test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: database-tests-log
          path: database-tests.log
          if-no-files-found: ignore

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client

      - name: Run transaction concurrency tests
        run: bash supabase/tests/concurrency_v2.sh

  production-backend-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [database-tests]
    env:
      POKER_LEDGER_DATABASE_URL: ${{ secrets.POKER_LEDGER_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Require production database connection
        run: |
          if [ -z "$POKER_LEDGER_DATABASE_URL" ]; then
            echo "::error::Missing repository secret POKER_LEDGER_DATABASE_URL."
            echo "Add a Postgres connection string for the Poker Ledger production database"
            echo "under Settings → Secrets and variables → Actions, then re-run this job."
            exit 1
          fi

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client

      - name: Verify production backend contract
        run: >
          psql "$POKER_LEDGER_DATABASE_URL"
          --no-psqlrc
          --set ON_ERROR_STOP=1
          --file supabase/production_checks/production_backend_contract.sql

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [build, database-tests, production-backend-contract]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
